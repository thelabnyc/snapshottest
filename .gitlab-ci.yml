workflow:
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

default:
  tags:
    - thelab-arm64

stages:
  - test
  - release

services: []

include:
  - component: gitlab.com/thelabnyc/thelab-ci-components/review@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/precommit@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/publish-gitlab-release@0.8.4

test:
  stage: test
  image: "registry.gitlab.com/thelabnyc/python:${IMAGE}"
  script:
    - uv sync
    - uv run tox
  parallel:
    matrix:
      - IMAGE: "3.11"
        TOX_SKIP_ENV: "^(?!py311)"
      - IMAGE: "3.12"
        TOX_SKIP_ENV: "^(?!py312)"
      - IMAGE: "3.13"
        TOX_SKIP_ENV: "^(?!py313)"
      - IMAGE: "3.14"
        TOX_SKIP_ENV: "^(?!py314)"

publish-to-pypi:
  stage: release
  image: registry.gitlab.com/thelabnyc/python:3.14.1248@sha256:02179604a284d1843f76e4c9994e2bbeef8c9e60c6807cd8f4616b1b7f186e36
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED
  environment:
    name: release
    deployment_tier: production
  script:
    - pip install twine
    # Build package
    - uv build
    # Publish to Gitlab's package registry
    - export TWINE_USERNAME=gitlab-ci-token
    - export TWINE_PASSWORD=${CI_JOB_TOKEN}
    - python -m twine upload
      --repository-url https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/pypi
      dist/*
